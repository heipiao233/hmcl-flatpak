on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
name: CI
jobs:
  check:
    name: Check HMCL update
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.get_jar.outputs.skip }}
      jar_url: ${{ steps.get_jar.outputs.jar_url }}
      version: ${{ steps.get_jar.outputs.version }}
      date: ${{ steps.get_jar.outputs.date }}
    steps:
      - name: Get last built version
        id: version_cache
        uses: actions/cache@v6
        with:
          path: |
            cache/current_version.txt
          key: hmcl-version-cache
          restore-keys: |
            hmcl-version-cache
      - name: Check HMCL Update
        id: get_jar
        run: |
          REPO="HMCL-dev/HMCL"
          RELEASE=$(curl -s "https://api.github.com/repos/$REPO/releases")
          JAR_URL=$(echo "$RELEASE" | jq -r '.[0].assets[] | select(.name | endswith(".jar")) | .browser_download_url' | head -1)
          LATEST_VERSION=$(echo "$RELEASE" | jq -r '.[0].tag_name')
          VERSION_DATE=$(echo "$RELEASE" | jq -r '.[0].published_at')
          mkdir -p cache
          if [ -f "cache/current_version.txt" ]; then
            CURRENT_VERSION=$(cat cache/current_version.txt)
          else
            CURRENT_VERSION="none"
          fi
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ "$LATEST_VERSION" = "$CURRENT_VERSION" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "$LATEST_VERSION" > cache/current_version.txt
          echo "jar_url=$JAR_URL" >> $GITHUB_OUTPUT
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "date=$VERSION_DATE" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

  flatpak:
    name: Flatpak (${{ matrix.variant.arch }})
    runs-on: ${{ matrix.variant.runner }}
    needs: [check]
    if: needs.check.outputs.skip == 'false'
    strategy:
      fail-fast: false
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    steps:
      - name: Info
        run: env | sort
      - uses: actions/checkout@v7
        name: Checkout
      - name: Download JAR
        run: |
          wget "${{ needs.check.outputs.jar_url }}" -O HMCL.jar
          SHA256=$(sha256sum HMCL.jar | awk '{print $1}')
          sed -i "s/HMCL_SHA256/$SHA256/" net.huangyuhui.hmcl.yml
          sed -i "s/HMCL_VERSION/${{ needs.check.outputs.version }}/" net.huangyuhui.hmcl.metainfo.xml
          sed -i "s/HMCL_DATE/${{ needs.check.outputs.date }}/" net.huangyuhui.hmcl.metainfo.xml
      - name: Setup GPG
        if: ${{ github.triggering_actor == github.repository_owner }}
        id: gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        name: Build Flatpak
        with:
          bundle: net.huangyuhui.hmcl-${{ github.ref_name }}-${{ matrix.variant.arch }}.flatpak
          manifest-path: net.huangyuhui.hmcl.yml
          arch: ${{ matrix.variant.arch }}
          cache-key: flatpak-builder-${{ matrix.variant.arch }}-${{ github.sha }}
          gpg-sign: ${{ steps.gpg.outputs.fingerprint }}
          verbose: true
      - name: Deploy the repo
        id: deployment
        uses: actions/upload-artifact@v7
        with:
          path: repo
          name: repo-${{ matrix.variant.arch }}
  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: flatpak
    steps:
      - name: Download all repo artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: repo-*
          path: repos
      - name: Setup GPG
        if: ${{ github.triggering_actor == github.repository_owner }}
        id: gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - name: Merge repos
        run: |
          sudo apt install flatpak
          mv repos/repo-x86_64 repo
          flatpak build-commit-from --gpg-sign=${{ steps.gpg.outputs.fingerprint }} --src-repo=repos/repo-aarch64 --src-ref=app/net.huangyuhui.hmcl/aarch64/master --update-appstream repo app/net.huangyuhui.hmcl/aarch64/master
          flatpak build-commit-from --gpg-sign=${{ steps.gpg.outputs.fingerprint }} --src-repo=repos/repo-aarch64 --src-ref=runtime/net.huangyuhui.hmcl.Debug/aarch64/master repo runtime/net.huangyuhui.hmcl.Debug/aarch64/master
      - name: Upload repo artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: repo
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
