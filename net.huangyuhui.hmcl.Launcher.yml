id: net.huangyuhui.hmcl.Launcher
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk25
rename-desktop-file: HMCL.desktop
rename-appdata-file: HMCL.appdata.xml
rename-icon: HMCL
separate-locales: false
command: HMCL
finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --persist=.minecraft
  - --env=PATH=/app/jre/bin:/app/jre-8/bin:/usr/bin:/app/bin

add-extensions:
  org.freedesktop.Sdk.Extension.openjdk8:
    version: '25.08'
    directory: jdk8 # this is relative to /app
    no-autodownload: true

modules:
  - name: openjdk
    buildsystem: simple
    build-commands:
      - "/usr/lib/sdk/openjdk25/install.sh"
  - name: HMCL
    buildsystem: simple
    build-options:
      no-debuginfo: true
    build-commands:
      - install -Dm644 HMCL.jar -t /app/HMCL
      - install -Dm755 HMCL.sh /app/bin/HMCL
      - install -Dm644 HMCL.desktop -t /app/share/applications
      - install -Dm644 HMCL.png -t /app/share/icons/hicolor/256x256/apps
      - install -Dm644 HMCL.appdata.xml -t /app/share/metainfo
    sources:
      - type: file
        dest-filename: HMCL.jar
        url: https://ci.huangyuhui.net/job/HMCL-stable/job/release%252F3.13/lastSuccessfulBuild/artifact/HMCL/build/libs/HMCL-3.13.2.jar
        sha256: d8e2ed7f8edf98d88414e9231e20c28fdf6c7a2332db93e59910d214abbd5852
        x-checker-data:
          type: json
          url: https://ci.huangyuhui.net/job/HMCL/lastSuccessfulBuild/api/json?pretty=true
          version-query: .artifacts[0].fileName | gsub("^HMCL-|.exe"; "")
          url-query: .url + "artifact/" + (.artifacts[] | select(.fileName=="HMCL-"
            + $version + ".jar") | .relativePath)

      - type: file
        path: HMCL.desktop

      - type: file
        path: HMCL.png

      - type: file
        path: HMCL.appdata.xml

      - type: script
        dest-filename: HMCL.sh
        commands:
          - export JAVA_HOME=/app/jre
          - export PATH=/app/jre/bin:/usr/bin
          - mkdir -p $XDG_DATA_HOME/HMCL
          - cd $XDG_DATA_HOME/HMCL || (echo "Can't open $XDG_DATA_HOME/HMCL" && exit 1)
          - exec java -XX:MinHeapFreeRatio=5 -XX:MaxHeapFreeRatio=15 -jar /app/HMCL/HMCL.jar



